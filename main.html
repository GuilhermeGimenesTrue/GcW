<html lang="en">
<head>

<body id="bodymain">
    <header>
        <h1>
            <img class="icon" src="img/ufoico.gif">
             COZINHA ESPACIAL INTERGALÁTICA
            <img class="icon" src="img/ufoico.gif">
        </h1>
    </header>
    <img id="cozinha" src="img/Aliens5.png">
    <div id="linkscontainer">
        <div id="board" class="linkbox">
        </div>
    <div id="chatbox" class="hidden">
        <img id="boardbg" src="img/Board2.png" alt="">
        <iframe id="chat" src="board_prototype/index.php" width="100%" height="100%" allowtransparency="yes" allow="autoplay" frameborder="0" marginheight="0" marginwidth="0" scrolling="auto" data-ruffle-polyfilled></iframe>
    </div>
    <div id="speechbox" style="display: block;">
        <h2 id="textboxtitle">COZINHA ESPACIAL INTERGALÁTICA</h2>
        <p id="textboxcontent">Esse é um site pessoal de comidas que encontrei em minhas viagens intergaláticas, então caros alienigenas, se sintam a vontade para retirar sua pele falsa de humano e saborear essa experiencia!</p>
    </div>
    <main></main>

<script>
    // JavaScript para mostrar o chatbox ao clicar no quadro e esconder ao clicar fora

    document.addEventListener("DOMContentLoaded", () => {
        const board = document.getElementById("board");
        const chatbox = document.getElementById("chatbox");
        const linkboxes = document.querySelectorAll('.linkbox');

        board.addEventListener("click", (event) =>{
            event.stopPropagation();
            chatbox.classList.remove("hidden");
            chatbox.classList.add("visible");
            linkboxes.forEach(linkbox => {linkbox.style.display = 'none';});
        });


        document.addEventListener("click", (event) => {
            const isClickedOutsideChatbox = !chatbox.contains(event.target);
            if (isClickedOutsideChatbox && chatbox.classList.contains("visible")) {
                chatbox.classList.remove("visible");
                chatbox.classList.add("hidden");
                linkboxes.forEach(linkbox => {linkbox.style.display = 'block';});
            }
        })
    });
</script>
<script>

    const speechBubble = document.getElementById("speechbox");
    const textBoxTitleElement = document.getElementById("textboxtitle");
    const initialText = textBoxTitleElement.textContent;
    const textBoxContentElement = document.getElementById("textboxcontent");
    const initialContent = textBoxContentElement.textContent;
    
    const icons = ["board"];

    const titles = {
        board: "QUADRO DE CORTIÇA"
    };

    const contents = {
        board: "Esse é o Quadro de Cortiça, onde todos compartilham receitas e dicas de culinária!"
    };

    function changeTextBoxContent(newContent) {
        textBoxContentElement.textContent = newContent;
    }

    function changeTextBoxTitle(newTitle) {
        textBoxTitleElement.textContent = newTitle;
    }

    icons.forEach(elementId => {
        const icon = document.getElementById(elementId);
        if (icon) {
            icon.addEventListener("mouseover", () => {
                speechBubble.style.display = "block";
                changeTextBoxTitle(titles[elementId]);
                changeTextBoxContent(contents[elementId]);
            });
            icon.addEventListener("mouseout", () => {
                speechBubble.style.display = "none";  
        });
        }
    });

</script>
</html>
